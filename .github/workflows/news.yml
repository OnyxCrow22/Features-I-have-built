# .github/workflows/news.yml
name: News Fetcher
on:
  repository_dispatch:
    types: [trigger-news]

permissions:
  contents: write
  
jobs:
  run-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install requests feedparser beautifulsoup4
      - name: Check News
        run: python Nexus_System/modules/bbc_news_fetcher.py
        env:
          NEWS_WEBHOOK_URL: ${{ secrets.NEWS_WEBHOOK_URL }}
