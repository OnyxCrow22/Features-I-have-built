name: Southern Rail Monitor

on:
  schedule:
    - cron: '*/5 4-20 * * *' # Runs every 5 mins from 4 AM to 8 PM
  workflow_dispatch:          # Allows you to click "Run workflow" manually

jobs:
  check-trains:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Restore the memory file from GitHub's cache
      - name: Restore train status cache
        uses: actions/cache@v4
        with:
          path: status_memory.txt
          key: train-status-cache

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      # 2. Run your updated Python script
      - name: Run Train Monitor Script
        run: python "Bots/Southern Bot Check.py"

      # 3. Save the updated memory file back to the cache
      - name: Save train status cache
        uses: actions/cache/save@v4
        with:
          path: status_memory.txt
          key: train-status-cache
