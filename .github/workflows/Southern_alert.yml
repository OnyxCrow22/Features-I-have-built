name: Southern Train Tracker
on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch: # Allows manual runs from GitHub UI

jobs:
  check-trains:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests
          
      - name: Check Southern Services
        run: python Nexus_System/modules/train_tracker.py
        env:
          TRAIN_WEBHOOK_URL: ${{ secrets.TRAIN_WEBHOOK_URL }}
