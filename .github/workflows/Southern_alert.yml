name: Southern Rail Monitor

on:
  schedule:
    # Runs every 5 minutes, between 04:00 UTC and 19:55 UTC (approx. 4 AM to 8 PM)
    - cron: '*/5 4-19 * * *'
  workflow_dispatch:

jobs:
  check-trains:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Train Monitor Script
      run: python "Travel bots/Southern Alerts/Southern Bot Check.py"
