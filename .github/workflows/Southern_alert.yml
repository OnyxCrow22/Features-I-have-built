name: Southern Train Tracker
on:
  workflow_dispatch: # Allows manual runs from GitHub UI


permissions:
  contents: write

concurrency:
  group: train-tracker
  cancel-in-progress: false

jobs:
  check-trains:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests
          
      - name: Check Southern Services
        run: python "Nexus_System/modules/Southern Bot Check.py"
        env:
          TRAIN_WEBHOOK_URL: ${{ secrets.TRAIN_WEBHOOK_URL }}
