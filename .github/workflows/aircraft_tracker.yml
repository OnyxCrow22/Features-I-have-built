name: Aircraft Tracker
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      lat:
        description: 'Latitude'
        default: '50.77'
      lon:
        description: 'Longitude' 
        default: '0.28'
      city:
        description: 'City name'
        default: 'Eastbourne'

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Check Airspace
        run: python Nexus_System/modules/aircraft_tracker.py
        env:
          AIRCRAFT_WEBHOOK_URL: ${{ secrets.AIRCRAFT_WEBHOOK_URL }}
          OVERRIDE_LAT: ${{ github.event.inputs.lat }}
          OVERRIDE_LON: ${{ github.event.inputs.lon }}
          OVERRIDE_CITY: ${{ github.event.inputs.city }}
