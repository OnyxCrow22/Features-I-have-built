name: Hourly Digest - Deals & News
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-hourly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests feedparser beautifulsoup4
          
      - name: Check Steam Deals
        run: python Nexus_System/modules/steam_price_tracker.py
        env:
          GAMING_PRICE_WEBHOOK_URL: ${{ secrets.GAMING_PRICE_WEBHOOK_URL }}
          
      - name: Check Epic Free Games
        run: python Nexus_System/modules/epic_freebies.py
        env:
          GAMING_PRICE_WEBHOOK_URL: ${{ secrets.GAMING_PRICE_WEBHOOK_URL }}
          
      - name: Check News Headlines
        run: python Nexus_System/modules/bbc_news_fetcher.py
        env:
          NEWS_WEBHOOK_URL: ${{ secrets.NEWS_WEBHOOK_URL }}
